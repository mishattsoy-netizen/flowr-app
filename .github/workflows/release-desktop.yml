name: Build and Publish Desktop App

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  release:
    name: Build & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform-flag: --win
          - os: macos-latest
            platform-flag: --mac
          - os: ubuntu-latest
            platform-flag: --linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build and Publish Desktop Installer
        run: npx electron-builder ${{ matrix.platform-flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # macOS: skip code signing (no Apple Developer account needed).
          # The DMG will show "can't be verified" — right-click → Open works.
          # To fully remove the warning, run: xattr -dr com.apple.quarantine /Applications/Flowr.app
          CSC_IDENTITY_AUTO_DISCOVERY: false
