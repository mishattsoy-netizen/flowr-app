name: Build and Publish Desktop App

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  release:
    name: Build & Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            platform-flag: --win
          - os: macos-latest
            platform-flag: --mac

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build and Publish Desktop Installer
        run: npx electron-builder ${{ matrix.platform-flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: mishattsoy-netizen/flowr-app-releases
          # macOS: skip code signing (no Apple Developer account).
          # Ships as a .pkg whose postinstall script (electron/pkg-scripts/postinstall)
          # strips quarantine and fixes ownership automatically, so the only
          # manual step left is one Gatekeeper "Open Anyway" click on the
          # installer itself. Auto-updates are handled by electron/updater-mac.js
          # (electron-updater's MacUpdater requires signing and won't work here).
          CSC_IDENTITY_AUTO_DISCOVERY: false
